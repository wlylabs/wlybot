<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="Wlybot - a fast, mobile-first AI assistant with multi-provider fallback">
<title>Wlybot</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #101010;
    --surface-2: #1a1a1a;
    --border: #262626;
    --text: #e6e6e6;
    --text-dim: #8b8b8b;
    --accent: #c8ff00;
    --accent-press: #a9d800;
    --accent-dim: rgba(200, 255, 0, .35);
    --danger: #ff5c5c;
    --radius: 4px;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "JetBrains Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    -webkit-text-size-adjust: 100%;
  }
  ::selection { background: var(--accent); color: #000; }
  * {
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  *::-webkit-scrollbar { width: 6px; height: 6px; }
  *::-webkit-scrollbar-thumb { background: var(--border); }
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 760px;
    margin: 0 auto;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: calc(12px + var(--sat)) 14px 12px;
    background: color-mix(in srgb, var(--bg) 90%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .title-wrap { flex: 1; min-width: 0; }
  .wordmark {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: .18em;
    color: var(--text);
  }
  .wordmark .o {
    color: var(--accent);
    text-shadow: 0 0 10px var(--accent-dim);
  }
  .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: .06em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .subtitle::before { content: "// "; color: var(--accent); }
  .icon-btn {
    width: 40px; height: 40px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-dim);
    display: grid;
    place-items: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s, color .15s, border-color .15s;
  }
  .icon-btn:active { background: var(--surface-2); color: var(--accent); border-color: var(--accent-dim); }
  .icon-btn svg { width: 19px; height: 19px; }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 18px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .empty-state {
    margin: auto;
    text-align: center;
    padding: 24px;
    color: var(--text-dim);
  }
  .brand-mark {
    font-size: 38px;
    font-weight: 800;
    letter-spacing: .14em;
    color: var(--text);
    margin-bottom: 14px;
  }
  .brand-mark .o {
    color: var(--accent);
    text-shadow: 0 0 18px var(--accent-dim), 0 0 42px var(--accent-dim);
  }
  .empty-state h2 {
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: .02em;
  }
  .empty-state h2 .hl { color: var(--accent); }
  .empty-state p {
    font-size: 13px;
    line-height: 1.6;
    max-width: 360px;
    margin: 0 auto 22px;
  }
  .suggestions { display: flex; flex-direction: column; gap: 8px; max-width: 360px; margin: 0 auto 24px; }
  .suggestion {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 12.5px;
    font-family: inherit;
    text-align: left;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .suggestion::before { content: "> "; color: var(--accent); }
  .suggestion:active { background: var(--surface-2); border-color: var(--accent-dim); }
  .empty-feats {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px 18px;
    font-size: 11px;
    letter-spacing: .04em;
    max-width: 360px;
    margin: 0 auto;
  }
  .empty-feats span::before { content: "\2713\00a0"; color: var(--accent); }

  .msg {
    max-width: 88%;
    padding: 12px 14px;
    border-radius: var(--radius);
    font-size: 13.5px;
    line-height: 1.65;
    word-wrap: break-word;
    overflow-wrap: break-word;
    animation: pop .18s ease-out;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .msg::before {
    display: block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .16em;
    margin-bottom: 6px;
  }
  .msg.user {
    align-self: flex-end;
    background: color-mix(in srgb, var(--accent) 7%, var(--bg));
    border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--bg));
    white-space: pre-wrap;
  }
  .msg.user::before { content: "YOU"; color: var(--text-dim); text-align: right; }
  .msg.bot {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .msg.bot::before { content: "WLYBOT"; color: var(--accent); }
  .msg.error {
    align-self: center;
    background: color-mix(in srgb, var(--danger) 8%, var(--bg));
    border: 1px solid color-mix(in srgb, var(--danger) 35%, transparent);
    color: var(--danger);
    font-size: 12px;
    max-width: 95%;
  }
  .msg.error::before { content: "ERROR"; color: var(--danger); }
  /* Markdown inside bot bubbles */
  .msg.bot p { margin: 0 0 10px; }
  .msg.bot p:last-child { margin-bottom: 0; }
  .msg.bot ul, .msg.bot ol { margin: 0 0 10px 20px; }
  .msg.bot li { margin-bottom: 4px; }
  .msg.bot li::marker { color: var(--accent); }
  .msg.bot h1, .msg.bot h2, .msg.bot h3 { font-size: 14px; margin: 12px 0 6px; letter-spacing: .02em; }
  .msg.bot h1::before, .msg.bot h2::before, .msg.bot h3::before { content: "# "; color: var(--accent); }
  .msg.bot code {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: inherit;
    font-size: 12.5px;
    color: var(--accent);
  }
  .msg.bot pre {
    position: relative;
    background: #000;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    overflow-x: auto;
    margin: 0 0 10px;
    -webkit-overflow-scrolling: touch;
  }
  .msg.bot pre code { background: none; border: none; padding: 0; font-size: 12.5px; line-height: 1.55; color: var(--text); }
  .msg.bot a { color: var(--accent); text-underline-offset: 3px; }
  .msg.bot blockquote {
    border-left: 2px solid var(--accent-dim);
    padding-left: 12px;
    color: var(--text-dim);
    margin: 0 0 10px;
  }
  .code-copy {
    position: absolute;
    top: 6px; right: 6px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: .08em;
    padding: 3px 8px;
    cursor: pointer;
  }
  .code-copy.done { color: var(--accent); border-color: var(--accent-dim); }

  /* Actions under bot replies */
  .msg-actions {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
  }
  .act {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0;
    transition: color .15s;
  }
  .act::before { content: "["; color: var(--border); font-weight: 400; }
  .act::after { content: "]"; color: var(--border); font-weight: 400; }
  .act:active, .act.done { color: var(--accent); }

  /* Typing indicator: blinking block cursor */
  .cursor-blink {
    display: inline-block;
    width: 9px; height: 16px;
    background: var(--accent);
    vertical-align: text-bottom;
    animation: cursor 1s steps(1) infinite;
  }
  @keyframes cursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* Composer */
  #composer {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 12px calc(10px + var(--sab));
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  #input-wrap {
    flex: 1;
    display: flex;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 6px 6px 12px;
    transition: border-color .15s;
  }
  #input-wrap:focus-within { border-color: var(--accent); }
  #input-wrap .prompt {
    color: var(--accent);
    font-size: 15px;
    line-height: 1.45;
    padding: 6px 8px 6px 0;
    user-select: none;
  }
  #input {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 16px; /* prevents iOS auto-zoom */
    font-family: inherit;
    line-height: 1.45;
    resize: none;
    outline: none;
    max-height: 120px;
    padding: 6px 0;
    caret-color: var(--accent);
  }
  #input::placeholder { color: var(--text-dim); }
  #mic {
    width: 34px; height: 34px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    display: grid;
    place-items: center;
    cursor: pointer;
    flex-shrink: 0;
    align-self: flex-end;
  }
  #mic svg { width: 18px; height: 18px; }
  #mic.rec { color: var(--accent); animation: recpulse 1.2s infinite; }
  @keyframes recpulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
  #send {
    width: 40px; height: 40px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #000;
    display: grid;
    place-items: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s, opacity .15s;
  }
  #send:active { background: var(--accent-press); }
  #send:disabled { opacity: .35; cursor: default; }
  #send svg { width: 18px; height: 18px; }
  #send .icon-stop { display: none; }
  #send.busy { background: var(--surface-2); color: var(--accent); border: 1px solid var(--border); }
  #send.busy .icon-send { display: none; }
  #send.busy .icon-stop { display: block; }

  /* Bottom sheets */
  #sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    max-width: 760px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 8px 18px calc(24px + var(--sab));
    z-index: 21;
    transform: translateY(105%);
    transition: transform .25s cubic-bezier(.3,.9,.3,1);
  }
  body.sheet-open #sheet { transform: none; }
  body.chats-open #chats-sheet { transform: none; }
  body.sheet-open #sheet-backdrop,
  body.chats-open #sheet-backdrop { opacity: 1; pointer-events: auto; }
  .sheet-handle {
    width: 40px; height: 3px;
    background: var(--border);
    margin: 8px auto 18px;
  }
  .sheet h3 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .16em;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .sheet h3::before { content: "// "; color: var(--accent); }
  .sheet .hint { font-size: 11.5px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.6; }
  .provider-option {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 13px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 8px;
    text-align: left;
    transition: border-color .15s;
  }
  .provider-option .radio {
    width: 14px; height: 14px;
    border: 1px solid var(--text-dim);
    flex-shrink: 0;
  }
  .provider-option.selected { border-color: var(--accent); }
  .provider-option.selected .radio {
    border-color: var(--accent);
    background: var(--accent);
    box-shadow: inset 0 0 0 2px var(--bg);
  }
  .provider-option small { display: block; color: var(--text-dim); font-size: 11px; margin-top: 3px; }
  .sheet-btn {
    width: 100%;
    margin-top: 8px;
    padding: 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    letter-spacing: .04em;
    cursor: pointer;
  }
  .sheet-btn:active { border-color: var(--accent-dim); color: var(--accent); }
  .sheet-danger {
    width: 100%;
    margin-top: 8px;
    padding: 13px;
    border: 1px solid color-mix(in srgb, var(--danger) 35%, transparent);
    border-radius: var(--radius);
    background: transparent;
    color: var(--danger);
    font-size: 13px;
    font-family: inherit;
    letter-spacing: .04em;
    cursor: pointer;
  }

  /* Conversations sheet */
  .sheet-new {
    width: 100%;
    padding: 12px;
    margin-bottom: 14px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    font-family: inherit;
    font-weight: 700;
    font-size: 12.5px;
    letter-spacing: .12em;
    cursor: pointer;
  }
  .sheet-new:active { background: var(--accent-press); }
  #chats-list { max-height: 50dvh; overflow-y: auto; }
  .chat-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .chat-item {
    flex: 1;
    min-width: 0;
    text-align: left;
    padding: 11px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    cursor: pointer;
    transition: border-color .15s;
  }
  .chat-item.active { border-color: var(--accent); }
  .chat-item .t { display: block; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-item .t::before { content: "> "; color: var(--accent); }
  .chat-item .d { display: block; font-size: 10.5px; color: var(--text-dim); margin-top: 3px; letter-spacing: .08em; }
  .chat-del {
    width: 44px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .chat-del:active { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 40%, transparent); }
  .chats-empty { color: var(--text-dim); font-size: 12px; text-align: center; padding: 10px 0 4px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="title-wrap">
      <div class="wordmark">WLYB<span class="o">0</span>T</div>
      <div class="subtitle" id="status">ready</div>
    </div>
    <button class="icon-btn" id="new-btn" aria-label="New chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="icon-btn" id="history-btn" aria-label="Conversations">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
    </button>
    <button class="icon-btn" id="settings-btn" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <main id="chat" aria-live="polite"></main>

  <div id="composer">
    <div id="input-wrap">
      <span class="prompt">$</span>
      <textarea id="input" rows="1" placeholder="type a message" autocomplete="off"></textarea>
      <button id="mic" aria-label="Voice input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
          <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
        </svg>
      </button>
    </div>
    <button id="send" aria-label="Send" disabled>
      <svg class="icon-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V5"/><path d="m5 12 7-7 7 7"/>
      </svg>
      <svg class="icon-stop" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="6" width="12" height="12" rx="1"/>
      </svg>
    </button>
  </div>
</div>

<div id="sheet-backdrop"></div>

<div id="chats-sheet" class="sheet" role="dialog" aria-label="Conversations">
  <div class="sheet-handle"></div>
  <h3>Conversations</h3>
  <p class="hint">Chats are stored on this device only.</p>
  <button class="sheet-new" id="sheet-new-btn">+ NEW CHAT</button>
  <div id="chats-list"></div>
</div>

<div id="sheet" class="sheet" role="dialog" aria-label="Settings">
  <div class="sheet-handle"></div>
  <h3>AI Model</h3>
  <p class="hint">API keys are configured on the server (Vercel environment variables), never on this device. Auto mode uses Groq first and falls back to Gemini, then OpenRouter, if it fails.</p>
  <div id="provider-list"></div>
  <button class="sheet-btn" id="export-btn">Export this chat (.md)</button>
  <button class="sheet-danger" id="clear-btn">Delete this chat</button>
</div>

<script>
(function () {
  'use strict';

  var chatEl = document.getElementById('chat');
  var inputEl = document.getElementById('input');
  var sendBtn = document.getElementById('send');
  var micBtn = document.getElementById('mic');
  var statusEl = document.getElementById('status');
  var backdropEl = document.getElementById('sheet-backdrop');

  var STORAGE_CHATS = 'wlybot.chats';
  var STORAGE_ACTIVE = 'wlybot.active';
  var STORAGE_LEGACY = 'wlybot.messages';
  var STORAGE_PROVIDER = 'wlybot.provider';

  var PROVIDER_LABELS = [
    { id: 'auto', name: 'Automatic (recommended)', desc: 'Groq first; falls back to Gemini, then OpenRouter' },
    { id: 'groq', name: 'Groq', desc: 'Llama 3.3 70B, very fast responses' },
    { id: 'gemini', name: 'Gemini', desc: 'Google Gemini 2.5 Flash' },
    { id: 'openrouter', name: 'OpenRouter', desc: 'Llama 3.3 70B (free tier)' }
  ];

  var busy = false;
  var abortCtrl = null;

  /* ---------- Multi-chat state ---------- */
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  var chats = [];
  try {
    chats = JSON.parse(localStorage.getItem(STORAGE_CHATS) || '[]');
    if (!Array.isArray(chats)) chats = [];
  } catch (e) { chats = []; }
  chats = chats.filter(function (c) {
    return c && typeof c.id === 'string' && Array.isArray(c.messages);
  });

  // Migrate the pre-multi-chat single history into a conversation.
  try {
    var legacy = JSON.parse(localStorage.getItem(STORAGE_LEGACY) || '[]');
    if (Array.isArray(legacy) && legacy.length) {
      var firstUser = null;
      for (var li = 0; li < legacy.length; li++) {
        if (legacy[li].role === 'user') { firstUser = legacy[li].content; break; }
      }
      chats.unshift({ id: uid(), title: (firstUser || 'Chat').slice(0, 60), messages: legacy, updated: Date.now() });
      localStorage.removeItem(STORAGE_LEGACY);
    }
  } catch (e) {}

  var current = null;
  var activeId = localStorage.getItem(STORAGE_ACTIVE);
  for (var ci = 0; ci < chats.length; ci++) {
    if (chats[ci].id === activeId) { current = chats[ci]; break; }
  }
  if (!current) current = { id: uid(), title: '', messages: [], updated: Date.now() };
  var messages = current.messages;

  function persist() {
    try {
      var out = chats
        .filter(function (c) { return c.messages.length > 0; })
        .sort(function (a, b) { return (b.updated || 0) - (a.updated || 0); })
        .slice(0, 30)
        .map(function (c) {
          return { id: c.id, title: c.title, updated: c.updated, messages: c.messages.slice(-60) };
        });
      localStorage.setItem(STORAGE_CHATS, JSON.stringify(out));
      localStorage.setItem(STORAGE_ACTIVE, current.id);
    } catch (e) {}
  }

  function sortedChats() {
    return chats
      .filter(function (c) { return c.messages.length > 0; })
      .sort(function (a, b) { return (b.updated || 0) - (a.updated || 0); });
  }

  function newChat() {
    if (busy) return;
    if (messages.length === 0) { closeSheets(); return; }
    current = { id: uid(), title: '', messages: [], updated: Date.now() };
    messages = current.messages;
    persist();
    renderAll();
    closeSheets();
  }

  function openChat(id) {
    if (busy) return;
    for (var i = 0; i < chats.length; i++) {
      if (chats[i].id === id) {
        current = chats[i];
        messages = current.messages;
        persist();
        renderAll();
        closeSheets();
        return;
      }
    }
  }

  function deleteChat(id) {
    if (busy) return;
    if (!confirm('Delete this conversation?')) return;
    for (var i = 0; i < chats.length; i++) {
      if (chats[i].id === id) { chats.splice(i, 1); break; }
    }
    if (current.id === id) {
      current = { id: uid(), title: '', messages: [], updated: Date.now() };
      messages = current.messages;
      renderAll();
    }
    persist();
    renderChats();
  }

  function getProvider() {
    return localStorage.getItem(STORAGE_PROVIDER) || 'auto';
  }

  function scrollToBottom() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  /* ---------- Lightweight markdown ---------- */
  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function renderInline(s) {
    return s
      .replace(/`([^`]+)`/g, function (_, c) { return '<code>' + c + '</code>'; })
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>')
      .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  }

  function renderMarkdown(raw) {
    var text = escapeHtml(raw);
    var parts = text.split(/```/);
    var html = '';
    for (var i = 0; i < parts.length; i++) {
      if (i % 2 === 1) {
        var code = parts[i].replace(/^[a-zA-Z0-9+_-]*\n/, '');
        html += '<pre><code>' + code + '</code></pre>';
      } else {
        html += renderBlocks(parts[i]);
      }
    }
    return html;
  }

  function renderBlocks(text) {
    var lines = text.split('\n');
    var html = '';
    var listType = null; // 'ul' | 'ol'
    var para = [];

    function flushPara() {
      if (para.length) {
        html += '<p>' + renderInline(para.join('<br>')) + '</p>';
        para = [];
      }
    }
    function closeList() {
      if (listType) { html += '</' + listType + '>'; listType = null; }
    }

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      var h = line.match(/^(#{1,3})\s+(.*)/);
      var ul = line.match(/^\s*[-*]\s+(.*)/);
      var ol = line.match(/^\s*\d+[.)]\s+(.*)/);
      var bq = line.match(/^>\s?(.*)/);

      if (h) {
        flushPara(); closeList();
        var lvl = h[1].length;
        html += '<h' + lvl + '>' + renderInline(h[2]) + '</h' + lvl + '>';
      } else if (ul || ol) {
        flushPara();
        var want = ul ? 'ul' : 'ol';
        if (listType !== want) { closeList(); html += '<' + want + '>'; listType = want; }
        html += '<li>' + renderInline((ul || ol)[1]) + '</li>';
      } else if (bq) {
        flushPara(); closeList();
        html += '<blockquote>' + renderInline(bq[1]) + '</blockquote>';
      } else if (line.trim() === '') {
        flushPara(); closeList();
      } else {
        closeList();
        para.push(line);
      }
    }
    flushPara(); closeList();
    return html;
  }

  /* ---------- Clipboard ---------- */
  function copyText(text, btn) {
    function done() {
      if (!btn) return;
      var old = btn.textContent;
      btn.textContent = 'copied';
      btn.classList.add('done');
      setTimeout(function () {
        btn.textContent = old;
        btn.classList.remove('done');
      }, 1200);
    }
    function fallback() {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      ta.remove();
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, function () { fallback(); done(); });
    } else {
      fallback(); done();
    }
  }

  /* ---------- Message rendering ---------- */
  function addBubble(role, content) {
    var el = document.createElement('div');
    el.className = 'msg ' + role;
    if (role === 'bot') el.innerHTML = renderMarkdown(content);
    else el.textContent = content;
    chatEl.appendChild(el);
    scrollToBottom();
    return el;
  }

  function addCodeCopies(el) {
    var pres = el.querySelectorAll('pre');
    for (var i = 0; i < pres.length; i++) {
      (function (pre) {
        var btn = document.createElement('button');
        btn.className = 'code-copy';
        btn.textContent = 'copy';
        btn.addEventListener('click', function () {
          var code = pre.querySelector('code');
          copyText((code ? code.textContent : pre.textContent).replace(/\n$/, ''), btn);
        });
        pre.appendChild(btn);
      })(pres[i]);
    }
  }

  function removeRegenButtons() {
    var olds = chatEl.querySelectorAll('.act-regen');
    for (var i = 0; i < olds.length; i++) olds[i].remove();
  }

  function decorateBot(el, raw, canRegen) {
    addCodeCopies(el);
    removeRegenButtons();
    var row = document.createElement('div');
    row.className = 'msg-actions';
    var c = document.createElement('button');
    c.className = 'act';
    c.textContent = 'copy';
    c.addEventListener('click', function () { copyText(raw, c); });
    row.appendChild(c);
    if (canRegen) {
      var r = document.createElement('button');
      r.className = 'act act-regen';
      r.textContent = 'regen';
      r.addEventListener('click', regenerate);
      row.appendChild(r);
    }
    el.appendChild(row);
  }

  function showEmptyState() {
    chatEl.innerHTML =
      '<div class="empty-state">' +
        '<div class="brand-mark">WLYB<span class="o">0</span>T</div>' +
        '<h2>An AI assistant <span class="hl">you own</span>.</h2>' +
        '<p>Any model. Every question. Zero friction.</p>' +
        '<div class="suggestions">' +
          '<button class="suggestion">Explain how an API works in simple terms</button>' +
          '<button class="suggestion">Write an Instagram caption for a coffee brand</button>' +
          '<button class="suggestion">Write a JavaScript function to validate an email</button>' +
        '</div>' +
        '<div class="empty-feats">' +
          '<span>multi-provider</span>' +
          '<span>streaming</span>' +
          '<span>voice input</span>' +
          '<span>no tracking</span>' +
        '</div>' +
      '</div>';
    var btns = chatEl.querySelectorAll('.suggestion');
    for (var i = 0; i < btns.length; i++) {
      btns[i].addEventListener('click', function () {
        inputEl.value = this.textContent;
        onInput();
        sendMessage();
      });
    }
  }

  function renderAll() {
    chatEl.innerHTML = '';
    if (messages.length === 0) { showEmptyState(); return; }
    for (var i = 0; i < messages.length; i++) {
      var m = messages[i];
      var el = addBubble(m.role === 'user' ? 'user' : 'bot', m.content);
      if (m.role !== 'user') decorateBot(el, m.content, i === messages.length - 1);
    }
  }

  /* ---------- Send & streaming ---------- */
  function setBusy(v) {
    busy = v;
    statusEl.textContent = v ? 'streaming_' : 'ready';
    sendBtn.classList.toggle('busy', v);
    sendBtn.setAttribute('aria-label', v ? 'Stop' : 'Send');
    updateSendState();
  }

  function updateSendState() {
    // While busy the button stays enabled so streaming can be stopped.
    sendBtn.disabled = !busy && inputEl.value.trim() === '';
  }

  function requestCompletion() {
    var convo = messages; // capture: user may not switch chats while busy, but be safe
    setBusy(true);

    var botEl = document.createElement('div');
    botEl.className = 'msg bot';
    botEl.innerHTML = '<span class="cursor-blink"></span>';
    chatEl.appendChild(botEl);
    scrollToBottom();

    abortCtrl = new AbortController();
    var acc = '';

    fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: abortCtrl.signal,
      body: JSON.stringify({ messages: convo, provider: getProvider() })
    }).then(function (res) {
      if (!res.ok) {
        return res.json().then(function (data) {
          throw new Error(data.error || 'Something went wrong (' + res.status + ')');
        }, function () {
          throw new Error('Something went wrong (' + res.status + ')');
        });
      }
      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      function pump() {
        return reader.read().then(function (r) {
          if (r.done) {
            acc += decoder.decode();
            return;
          }
          acc += decoder.decode(r.value, { stream: true });
          botEl.innerHTML = renderMarkdown(acc);
          scrollToBottom();
          return pump();
        });
      }
      return pump();
    }).then(function () {
      finish();
    }).catch(function (err) {
      if (err.name === 'AbortError') { finish(); return; }
      botEl.remove();
      addBubble('error', err.message);
      setBusy(false);
    });

    function finish() {
      if (acc.trim() === '') {
        botEl.remove();
        addBubble('error', 'No response from the model. Try again or switch providers in settings.');
      } else {
        convo.push({ role: 'assistant', content: acc });
        current.updated = Date.now();
        persist();
        botEl.innerHTML = renderMarkdown(acc);
        decorateBot(botEl, acc, convo === messages);
      }
      setBusy(false);
      scrollToBottom();
    }
  }

  function sendMessage() {
    var text = inputEl.value.trim();
    if (!text || busy) return;

    if (messages.length === 0) chatEl.innerHTML = '';
    removeRegenButtons();

    if (chats.indexOf(current) === -1) chats.unshift(current);
    if (!current.title) current.title = text.slice(0, 60);
    current.updated = Date.now();

    messages.push({ role: 'user', content: text });
    persist();
    addBubble('user', text);

    inputEl.value = '';
    onInput();
    requestCompletion();
  }

  function regenerate() {
    if (busy) return;
    if (!messages.length || messages[messages.length - 1].role !== 'assistant') return;
    messages.pop();
    current.updated = Date.now();
    persist();
    var bots = chatEl.querySelectorAll('.msg.bot');
    if (bots.length) bots[bots.length - 1].remove();
    requestCompletion();
  }

  /* ---------- Input ---------- */
  function onInput() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    updateSendState();
  }
  inputEl.addEventListener('input', onInput);
  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey && window.matchMedia('(min-width: 700px)').matches) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', function () {
    if (busy) {
      if (abortCtrl) abortCtrl.abort();
    } else {
      sendMessage();
    }
  });

  /* ---------- Voice input (Web Speech API) ---------- */
  var SRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SRec) {
    micBtn.style.display = 'none';
  } else {
    var rec = null;
    var recActive = false;
    var recBase = '';
    micBtn.addEventListener('click', function () {
      if (recActive) {
        try { rec.stop(); } catch (e) {}
        return;
      }
      rec = new SRec();
      rec.lang = navigator.language || 'id-ID';
      rec.interimResults = true;
      recBase = inputEl.value ? inputEl.value.replace(/\s+$/, '') + ' ' : '';
      rec.onresult = function (e) {
        var t = '';
        for (var i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
        inputEl.value = recBase + t;
        onInput();
      };
      rec.onend = function () {
        recActive = false;
        micBtn.classList.remove('rec');
        updateSendState();
      };
      rec.onerror = function () {};
      try {
        rec.start();
        recActive = true;
        micBtn.classList.add('rec');
      } catch (e) {}
    });
  }

  /* ---------- Export ---------- */
  function exportChat() {
    if (!messages.length) {
      alert('Nothing to export yet.');
      return;
    }
    var lines = ['# Wlybot chat', ''];
    for (var i = 0; i < messages.length; i++) {
      var m = messages[i];
      lines.push((m.role === 'user' ? '**You:**' : '**Wlybot:**') + '\n\n' + m.content);
      lines.push('');
    }
    var blob = new Blob([lines.join('\n')], { type: 'text/markdown' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'wlybot-chat-' + new Date().toISOString().slice(0, 10) + '.md';
    a.click();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
  }

  /* ---------- Bottom sheets ---------- */
  function renderProviders() {
    var list = document.getElementById('provider-list');
    var currentProvider = getProvider();
    list.innerHTML = '';
    PROVIDER_LABELS.forEach(function (p) {
      var btn = document.createElement('button');
      btn.className = 'provider-option' + (p.id === currentProvider ? ' selected' : '');
      btn.innerHTML = '<span class="radio"></span><span>' + p.name + '<small>' + p.desc + '</small></span>';
      btn.addEventListener('click', function () {
        localStorage.setItem(STORAGE_PROVIDER, p.id);
        renderProviders();
        closeSheets();
      });
      list.appendChild(btn);
    });
  }

  function fmtDate(ts) {
    var d = new Date(ts || 0);
    var now = new Date();
    if (d.toDateString() === now.toDateString()) {
      return ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
    }
    return ('0' + d.getDate()).slice(-2) + '/' + ('0' + (d.getMonth() + 1)).slice(-2);
  }

  function renderChats() {
    var list = document.getElementById('chats-list');
    list.innerHTML = '';
    var sorted = sortedChats();
    if (!sorted.length) {
      list.innerHTML = '<div class="chats-empty">no conversations yet</div>';
      return;
    }
    sorted.forEach(function (c) {
      var row = document.createElement('div');
      row.className = 'chat-row';

      var item = document.createElement('button');
      item.className = 'chat-item' + (c.id === current.id ? ' active' : '');
      var t = document.createElement('span');
      t.className = 't';
      t.textContent = c.title || 'Chat';
      var d = document.createElement('span');
      d.className = 'd';
      d.textContent = fmtDate(c.updated) + ' · ' + c.messages.length + ' msg';
      item.appendChild(t);
      item.appendChild(d);
      item.addEventListener('click', function () { openChat(c.id); });

      var del = document.createElement('button');
      del.className = 'chat-del';
      del.setAttribute('aria-label', 'Delete conversation');
      del.textContent = '×';
      del.addEventListener('click', function () { deleteChat(c.id); });

      row.appendChild(item);
      row.appendChild(del);
      list.appendChild(row);
    });
  }

  function openSettings() { closeSheets(); renderProviders(); document.body.classList.add('sheet-open'); }
  function openChats() { closeSheets(); renderChats(); document.body.classList.add('chats-open'); }
  function closeSheets() {
    document.body.classList.remove('sheet-open');
    document.body.classList.remove('chats-open');
  }
  document.getElementById('settings-btn').addEventListener('click', openSettings);
  document.getElementById('history-btn').addEventListener('click', openChats);
  document.getElementById('new-btn').addEventListener('click', newChat);
  document.getElementById('sheet-new-btn').addEventListener('click', newChat);
  document.getElementById('export-btn').addEventListener('click', exportChat);
  backdropEl.addEventListener('click', closeSheets);

  document.getElementById('clear-btn').addEventListener('click', function () {
    if (!confirm('Delete this chat?')) return;
    messages.splice(0, messages.length);
    current.title = '';
    persist();
    closeSheets();
    renderAll();
  });

  /* ---------- Init ---------- */
  renderAll();
  scrollToBottom();
})();
</script>
</body>
</html>
